<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuanaTalk - Hangman</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>

   <header class="navbar">
    <div class="logo">
        <img src="img/logo.png" alt="GuanaTalk Logo">
        <span>GuanaTalk</span>
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="#">Favorite</a>
        <a href="#">About us</a>
    </nav>
    <div class="profile-dropdown">
        <button class="profile-btn">
            My Profile <i class="ri-arrow-down-s-line"></i>
        </button>
    </header>

    <main class="game-container">
        <h2 class="title">GuanaGuess: Palabras Caliches</h2>
        
        <div class="content-wrapper">
            <div class="game-board">
                <div class="hint-area">Pista: <span id="hint-text"></span></div>

                <div id="hangman-drawing">
                    <div id="h-stand"></div>
                    <div id="h-rope"></div>
                    <div id="h-head"></div>
                    <div id="h-body"></div>
                    <div id="h-arm-l"></div>
                    <div id="h-arm-r"></div>
                    <div id="h-leg-l"></div>
                    <div id="h-leg-r"></div>
                </div>

                <div id="word-display" class="word-display"></div>
                
                <div id="definition-area" class="definition-area" style="display: none;"></div>
            </div>

            <div class="stats-area">
                <h3>Usadas</h3>
                <div id="used-letters" class="used-letters"></div>
                <h3>Intentos restantes</h3>
                <div class="progress-bar">
                    <div id="progress" class="progress"></div>
                </div>
                <span id="attempts">5</span>
            </div>
        </div>

        <div id="keyboard" class="keyboard"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
