<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register GuanaTalk</title>
    <link rel="stylesheet" href="registerr.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="img/logo.png" alt="GuanaTalk Logo">
             <span>GuanaTalk</span>
        </div>
        <button class="profile-btn">My Profile</button>
    </header>

    <div class="container">
        <div class="form-card-header">
            <h2>GuanaTalk Registration: Join Our Journey</h2>
        </div>
    </div>
    
    <form class="forms" action="php/register.php" method="POST">

        <div class="form-grid">

            <!-- Apartado: Nombre -->
            <div class="form-group-container">
                <div class="icon-column side-name">
                    <span class="emoji-icon">👤</span>
                </div>
                <div class="input-column">
                    <label>Full Name</label>
                    <input type="text" name="nombre" placeholder="Enter your full name" required>
                </div>
            </div>

            <!-- Apartado: Email -->
            <div class="form-group-container">
                <div class="icon-column side-email">
                    <span class="emoji-icon">📧</span>
                </div>
                <div class="input-column">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <!-- Apartado: Password -->
            <div class="form-group-container">
                <div class="icon-column side-password">
                    <span class="emoji-icon">🔒</span>
                </div>
                <div class="input-column">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <!-- Apartado: Confirm Password -->
            <div class="form-group-container">
                <div class="icon-column side-password">
                    <span class="emoji-icon">🔒</span>
                </div>
                <div class="input-column">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm your password" required>
                    <p class="help-text">Need help registering?</p>
                </div>
            </div>

        </div>

        <button class="register-btn" type="submit">Register Now!</button>

    </form>

    <!-- FUN FACT SECTION -->
    <div class="fun-fact">
        <div class="fun-left">
             <span class="megaphone-box">📢</span>
            <p><b>Fun Fact:</b> We’re growing global community! Join and meet others</p>
        </div>
        <i class="fa-solid fa-chevron-right"></i>
    </div>

</body>
</html>
